<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <title>Sign Up</title>

  <style>
    .container {
      background-color: #3f585c89;
      color: #E1B986;
      margin: auto;
      width: 500px;
      text-align: left;
      padding: 35px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;

    }

    input[type=password],
    input[type=email] {
      width: 95%;
      padding: 15px;
      margin: 5px 0px 22px 0px;
      display: inline-block;
      border: none;
      background: #f1f1f1;
      outline: none;

    }

    body {
      background-image: url(./Images/SignInPage/BG.jpeg);
      background-size: cover;
      background-repeat: no-repeat;
      image-rendering: auto;
      width: 100%;
      height: auto;
    }

    #container {
      background-color: #3f585c7a;
      text-align: center;
      color: #E1B986;
      padding: 20px;
      font-family: Verdana, Geneva, Tahoma, sans-serif;

    }


    button:hover {
      opacity: 1;
    }

    .cancelbtn,
    .signupbtn {
      float: left;
      width: 50%;

    }

    .cancelbtn {
      padding: 14px 19px;
      background-color: rgba(255, 0, 0, 0.765);
      cursor: pointer;
    }

    .signupbtn {
      padding: 14px 19px;
      background-color: rgba(0, 255, 0, 0.765);
      cursor: pointer;
    }
  </style>
</head>

<body>

  <div id="container">
    <h1>SIGN IN!</h1>
  </div><br>

  <div class="container">

    <fieldset>
      <legend>Log In</legend>
      <form action="./index.html.html">


        <label for="email">Email</label><br>
        <input type="email" id="email" placeholder="Enter Email" name="email" required>

        <label for="password">Password</label><br>
        <input type="password" id="password" placeholder="Enter Password" name="password" required>

        <input type="checkbox" class="form-check-input" id="check1" name="option1" value="something" checked>
        <label class="form-check-label" for="check1">Remember me</label><br>

        <label class="form-check-label" for="createacc">Don't have an account? <a href="./websiterecipeform.html">Create Account</a></label>





        <div class="endbutton">
          <button type="reset" class="cancelbtn">Cancel</button>
          <button type="submit" class="signupbtn">Log In</button>


        </div>

      </form>
    </fieldset>
  </div>

</body>

</html>
